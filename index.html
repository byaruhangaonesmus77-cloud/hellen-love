<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For My Love Hellen 💕</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff69b4">
  <style>
    body {
      font-family: 'Cursive', sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: #fff;
      margin: 0;
      padding: 40px;
    }
    #gate, #surprise { display: none; }
    h1 { animation: glow 2s infinite alternate; }
    @keyframes glow {
      from { text-shadow: 0 0 10px #fff; }
      to { text-shadow: 0 0 20px #ff69b4; }
    }
    .slideshow img {
      width: 250px;
      border-radius: 15px;
      display: none;
    }
    .slideshow img.active { display: block; }
    #journal, #timeline {
      margin-top: 30px;
      text-align: left;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
    }
    #entries p {
      background: rgba(255,255,255,0.2);
      padding: 10px;
      border-radius: 8px;
      margin: 10px 0;
    }
    #entries img {
      margin-top: 10px;
      border-radius: 10px;
      max-width: 200px;
    }
  </style>
</head>
<body>
  <!-- Birthday Gate -->
  <div id="gate">
    <h2>Enter my special day 💖</h2>
    <input type="text" id="birthday" placeholder="DD-MM-YYYY">
    <button onclick="checkBirthday()">Unlock</button>
    <p id="message"></p>
  </div>

  <!-- Surprise Page -->
  <div id="surprise">
    <h1>💖 To My Lovely Hellen 💖</h1>
    <p>You are my sunshine 🌞, my happiness 😊, and my forever love 💕 Thanks for choosing me always love, I will also always choose you. I love you dangerously and miss you so much.</p>

    <!-- Background Music -->
    <audio controls autoplay loop>
      <source src="love-song.mp3" type="audio/mpeg">
    </audio>

    <!-- Slideshow -->
    <div class="slideshow">
      <img src="hellen1.jpg" class="active">
      <img src="hellen2.jpg">
      <img src="hellen3.jpg">
      <img src="hellen4.jpg">
      <img src="hellen5.jpg">
      <img src="hellen6.jpg">
    </div>

    <!-- Shared Journal -->
    <div id="journal">
      <h2>Our Shared Journal 💌</h2>
      <textarea id="entry" placeholder="Write your thoughts here..."></textarea><br>
      <input type="file" id="photo" accept="image/*"><br><br>
      <button onclick="saveEntry()">Save</button>
      <div id="journal-entries"></div>
    </div>

    <!-- Memory Timeline -->
    <div id="timeline">
      <h2>Our Love Journey ❤️</h2>
      <div id="timeline-entries"></div>
    </div>
  </div>

  <!-- Birthday + Slideshow Logic -->
  <script>
    document.getElementById("gate").style.display = "block";

    function checkBirthday() {
      let input = document.getElementById("birthday").value.trim();
      if (input === "30-07-2003" || input === "30/07/2003") {
        document.getElementById("gate").style.display = "none";
        document.getElementById("surprise").style.display = "block";
        startSlideshow();
        document.querySelector("audio").play();
      } else {
        document.getElementById("message").innerText = "Hmm… try again, love 💕 (Format: DD-MM-YYYY)";
      }
    }

    function startSlideshow() {
      let slides = document.querySelectorAll('.slideshow img');
      let index = 0;
      setInterval(() => {
        slides[index].classList.remove('active');
        index = (index + 1) % slides.length;
        slides[index].classList.add('active');
      }, 3000);
    }
  </script>

  <!-- Firebase Integration -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDGq6qQXzqcJ95imJp6s2tFAV4E_y7wP2o",
      authDomain: "lovejournal-3b850.firebaseapp.com",
      projectId: "lovejournal-3b850",
      storageBucket: "lovejournal-3b850.appspot.com",
      messagingSenderId: "884818004432",
      appId: "1:884818004432:web:64b2e5454f875411a2d1d5",
      measurementId: "G-Q7T3ZCN6J0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Save entry
    window.saveEntry = async function() {
      let text = document.getElementById("entry").value.trim();
      let photoInput = document.getElementById("photo");
      let photoFile = photoInput.files[0];
      let photoURL = "";

      if (photoFile) {
        const storageRef = ref(storage, "photos/" + photoFile.name);
        await uploadBytes(storageRef, photoFile);
        photoURL = await getDownloadURL(storageRef);
      }

      if (text !== "" || photoURL !== "") {
        await addDoc(collection(db, "entries"), {
          text: text,
          photo: photoURL,
          date: new Date().toLocaleString()
        });

        document.getElementById("entry").value = "";
        photoInput.value = "";
      }
    };

    // Real-time listener
    onSnapshot(collection(db, "entries"), (snapshot) => {
      let journalDiv = document.getElementById("journal-entries");
      let timelineDiv = document.getElementById("timeline-entries");
      journalDiv.innerHTML = "";
      timelineDiv.innerHTML = "";

      snapshot.forEach((doc) => {
        let data = doc.data();
        let entryHTML = `<p><strong>${data.date}:</strong> ${data.text}</p>`;
        if (data.photo) {
          entryHTML += `<img src="${data.photo}" alt="Memory photo">`;
        }
        journalDiv.innerHTML += entryHTML;
        timelineDiv.innerHTML += entryHTML;
      });
    });
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js')
        .then(() => console.log('Service Worker Registered'));
    }
  </script>
</body>
</html>
